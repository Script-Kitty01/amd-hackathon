name: Build and push agent image

# Builds the lean Track 1 submission image (deterministic solvers + Fireworks,
# no bundled model) on GitHub's runners and pushes it to GHCR — no local Docker
# needed. The pushed image URL is what you submit (make the package public
# first: repo -> Packages -> settings).
#
# MANUAL ONLY: this runs on workflow_dispatch, NOT on push. That is deliberate —
# the submission image is built and pushed to :latest from a verified local
# build, and an automatic push here would overwrite that verified image with a
# different digest (and a multi-arch attestation manifest). Trigger this by hand
# from the Actions tab only if you want CI to rebuild.

on:
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./token-efficient-agent
          file: ./token-efficient-agent/Dockerfile
          push: true
          platforms: linux/amd64
          # Clean single-platform image: no provenance/SBOM attestation manifest
          # (the "unknown/unknown" entry) that some grading harnesses choke on.
          provenance: false
          sbom: false
          tags: ghcr.io/script-kitty01/token-efficient-agent:latest

      - name: Report image size
        run: |
          docker pull ghcr.io/script-kitty01/token-efficient-agent:latest
          docker images ghcr.io/script-kitty01/token-efficient-agent:latest --format "uncompressed: {{.Size}}"
